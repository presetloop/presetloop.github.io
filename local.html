


<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
/>
<title>Magazine Viewer</title>
<style>
  html,
  body {
    margin: 0;
    overflow: hidden;
    background: #050505;
    font-family: sans-serif;
  }

  .viewer-shell {
    width: 100vw;
    height: 100vh;

    display: flex;
    align-items: center;
    justify-content: center;

    overflow: hidden;
  }

  /* =====================================================
     MAGAZINE
  ===================================================== */

  .magazine-wrapper {
    position: relative;
  }

  .magazine {
    position: relative;

    width: 1920px;
    height: 1080px;

    overflow: hidden;

    background: #000;

    box-shadow:
      0 0 80px rgba(0,0,0,0.75),
      0 0 180px rgba(0,0,0,0.45);

    transform-origin: center center;
  }

  /* =====================================================
     PAGES
  ===================================================== */

  .page {
    position: absolute;
    inset: 0;

    opacity: 0;

    transition:
      opacity 0.8s ease;

    pointer-events: none;
  }

  .page.active {
    opacity: 1;
    pointer-events: auto;
    z-index: 20;
  }

  canvas {
    width: 100%;
    height: 100%;
    display: block;
    background: #000;
  }

  /* =====================================================
     OFF CANVAS CONTROLS
  ===================================================== */

  .page-counter {
    position: absolute;

    top: -52px;
    right: 0;

    color:
      rgba(255,255,255,0.65);

    font-size: 14px;

    letter-spacing: 0.2em;

    user-select: none;

    z-index: 100;
  }

  .clear-btn {
    position: absolute;

    top: -62px;
    left: 0;

    border: 0;

    background:
      rgba(255,255,255,0.08);

    color: white;

    padding:
      12px 18px;

    border-radius: 12px;

    font-size: 13px;

    letter-spacing: 0.12em;

    cursor: pointer;

    transition: 0.2s ease;

    z-index: 100;
  }

  .clear-btn:hover {
    background:
      rgba(255,255,255,0.18);
  }

  /* =====================================================
     INTRO UI
  ===================================================== */

  .page-ui {
    position: absolute;
    inset: 0;

    display: flex;
    flex-direction: column;
    justify-content: space-between;

    padding: 48px;

    z-index: 50;
  }

  .dropzone {
    width: 520px;

    border:
      2px dashed rgba(255,255,255,0.2);

    background:
      rgba(0,0,0,0.45);

    border-radius: 28px;

    padding: 32px;

    transition: 0.25s ease;
  }

  .dropzone.dragover {
    border-color: #fff;

    background:
      rgba(255,255,255,0.08);
  }

  /* =====================================================
     GRID PAGE
  ===================================================== */

  .grid-page {
    width: 100%;
    height: 100%;

    overflow-y: auto;

    padding: 40px;

    box-sizing: border-box;

    background:
      #050505;

    display: grid;

    grid-template-columns:
      repeat(auto-fill, minmax(320px, 1fr));

    gap: 24px;
  }

  .thumb {
    position: relative;

    overflow: hidden;

    border-radius: 18px;

    cursor: pointer;

    background: #111;

    aspect-ratio: 16 / 9;

    transition:
      transform 0.2s ease;
  }

  .thumb:hover {
    transform: scale(1.02);
  }

  .thumb img {
    width: 100%;
    height: 100%;

    object-fit: cover;

    display: block;
  }

  .thumb-label {
    position: absolute;

    left: 12px;
    bottom: 12px;

    background:
      rgba(0,0,0,0.55);

    color: white;

    font-size: 12px;

    letter-spacing: 0.12em;

    padding:
      5px 8px;

    border-radius: 8px;
  }

  /* =====================================================
     DELETE BUTTON
  ===================================================== */

  .delete-btn {
    position: absolute;

    top: 10px;
    right: 10px;

    width: 34px;
    height: 34px;

    border: 0;

    border-radius: 999px;

    background:
      rgba(0,0,0,0.65);

    color: white;

    font-size: 18px;

    cursor: pointer;

    opacity: 0;

    transition:
      opacity 0.2s ease,
      background 0.2s ease;

    z-index: 10;
  }

  .thumb:hover .delete-btn {
    opacity: 1;
  }

  .delete-btn:hover {
    background:
      rgba(255,0,0,0.8);
  }

  /* =====================================================
     RESPONSIVE SCALE
  ===================================================== */

  @media (max-width: 1920px),
         (max-height: 1080px) {

    .magazine-wrapper {
      transform: scale(
        min(
          calc(100vw / 1920),
          calc(100vh / 1080)
        )
      );
    }
  }
</style>

<script src='tailwindcss.min.js'></script>

<link rel='stylesheet' href='style.css' />
</head>

<body>

<div class="viewer-shell">

  <div class="magazine-wrapper">

    <!-- CLEAR -->
    <button
      id="clearBtn"
      class="clear-btn"
    >
      CLEAR ALL PAGES
    </button>

    <!-- COUNTER -->
    <div
      id="pageCounter"
      class="page-counter"
    >
      0 / 0
    </div>

    <!-- MAGAZINE -->
    <div
      id="magazine"
      class="magazine"
    >

      <div id="pages"></div>

    </div>

  </div>

</div>

<script>
// =====================================================
// ELEMENTS
// =====================================================

const pagesEl =
  document.getElementById('pages');

const pageCounter =
  document.getElementById('pageCounter');

const clearBtn =
  document.getElementById('clearBtn');

// =====================================================
// STATE
// =====================================================

const state = {
  pages: [],
  imagePages: [],
  images: [],
  currentIndex: 0,
  introPage: null,
  gridPage: null
};

// =====================================================
// SHOW PAGE
// =====================================================

function showPage(index) {

  if (!state.pages.length) return;

  if (index < 0) index = state.pages.length - 1;
  if (index >= state.pages.length) index = 0;

  state.pages.forEach(p => p.classList.remove('active'));
  state.pages[index].classList.add('active');

  state.currentIndex = index;

  updateCounter();
}

// =====================================================
// COUNTER
// =====================================================

function updateCounter() {

  const current = state.currentIndex;

  const total =
    Math.max(state.pages.length - 1, 0);

  pageCounter.textContent =
    `${current} / ${total}`;
}

// =====================================================
// CREATE IMAGE PAGE (GIF SAFE VERSION)
// =====================================================

function createImagePage(src) {

  const page = document.createElement('div');
  page.className = 'page';

  // IMPORTANT: use IMG instead of canvas for GIF support
  const imgEl = document.createElement('img');

  imgEl.src = src;

  imgEl.style.width = "100%";
  imgEl.style.height = "100%";
  imgEl.style.objectFit = "contain";
  imgEl.draggable = false;

  page.appendChild(imgEl);

  // click → go to grid
  page.addEventListener('click', () => {

    if (!state.gridPage) return;

    const gridIndex =
      state.pages.indexOf(state.gridPage);

    showPage(gridIndex);
  });

  if (state.gridPage) {

    pagesEl.insertBefore(page, state.gridPage);

    const gridIndex =
      state.pages.indexOf(state.gridPage);

    state.pages.splice(gridIndex, 0, page);

  } else {

    pagesEl.appendChild(page);
    state.pages.push(page);
  }

  state.imagePages.push(page);
}

// =====================================================
// DELETE IMAGE PAGE
// =====================================================

function deleteImagePage(index) {

  const pass =
    prompt('Type "okay" to delete this page.');

  if (pass !== 'okay') return;

  const confirmed =
    confirm('Delete this page permanently?');

  if (!confirmed) return;

  const page =
    state.imagePages[index];

  if (!page) return;

  page.remove();

  state.pages =
    state.pages.filter(p => p !== page);

  state.imagePages.splice(index, 1);
  state.images.splice(index, 1);

  rebuildGridPage();

  if (state.currentIndex >= state.pages.length) {
    showPage(state.pages.length - 1);
  } else {
    showPage(state.currentIndex);
  }
}

// =====================================================
// GRID PAGE
// =====================================================

function rebuildGridPage() {

  if (state.gridPage) {
    state.gridPage.remove();
    state.pages =
      state.pages.filter(p => p !== state.gridPage);
  }

  const page = document.createElement('div');
  page.className = 'page';

  const grid = document.createElement('div');
  grid.className = 'grid-page';

  state.images.forEach((src, index) => {

    const thumb = document.createElement('div');
    thumb.className = 'thumb';

    thumb.innerHTML = `
      <img src="${src}">
      <div class="thumb-label">PAGE ${index + 1}</div>
      <button class="delete-btn">×</button>
    `;

    thumb.addEventListener('click', () => {
      showPage(index + 1);
    });

    const deleteBtn =
      thumb.querySelector('.delete-btn');

    deleteBtn.addEventListener('click', e => {
      e.stopPropagation();
      deleteImagePage(index);
    });

    grid.appendChild(thumb);
  });

  page.appendChild(grid);

  pagesEl.appendChild(page);

  state.pages.push(page);
  state.gridPage = page;

  updateCounter();
}

// =====================================================
// LOAD FILES
// =====================================================

function loadFiles(files) {

  [...files].forEach(file => {

    if (!file.type.startsWith('image/')) return;

    const reader = new FileReader();

    reader.onload = e => {

      const src = e.target.result;

      state.images.push(src);

      createImagePage(src);
      rebuildGridPage();

      if (state.images.length === 1) {
        showPage(1);
      }

      updateCounter();
    };

    reader.readAsDataURL(file);
  });
}

// =====================================================
// CLEAR ALL
// =====================================================

clearBtn.addEventListener('click', () => {

  if (!state.images.length) return;

  const confirmed =
    confirm('Delete ALL uploaded pages?');

  if (!confirmed) return;

  state.imagePages.forEach(p => p.remove());

  if (state.gridPage) state.gridPage.remove();

  state.pages = [state.introPage];
  state.imagePages = [];
  state.images = [];
  state.gridPage = null;

  showPage(0);
  updateCounter();
});

// =====================================================
// INTRO PAGE (UNCHANGED STRUCTURE)
// =====================================================

function createIntroPage() {

  const page = document.createElement('div');
  page.className = 'page active';

  const ui = document.createElement('div');
  ui.className = 'page-ui';

  ui.innerHTML = `
    <div id="dropzone" class="dropzone">
      <div class="text-white text-3xl font-bold mb-3">
        Add Images
      </div>

      <div class="text-white/60 mb-6">
        Drag and drop images or upload
      </div>

      <input id="fileInput" type="file" multiple accept="image/*" class="hidden">

      <button id="uploadBtn" class="bg-white text-black px-6 py-3 rounded-xl font-semibold">
        Upload
      </button>
    </div>

    <div class="text-center text-white/40">
      Use arrows / swipe / ESC for grid
    </div>
  `;

  page.appendChild(ui);

  pagesEl.appendChild(page);

  state.pages.push(page);
  state.introPage = page;

  const fileInput = ui.querySelector('#fileInput');
  const uploadBtn = ui.querySelector('#uploadBtn');
  const dropzone = ui.querySelector('#dropzone');

  uploadBtn.onclick = () => fileInput.click();

  fileInput.onchange = e => loadFiles(e.target.files);

  dropzone.addEventListener('dragover', e => {
    e.preventDefault();
    dropzone.classList.add('dragover');
  });

  dropzone.addEventListener('dragleave', () => {
    dropzone.classList.remove('dragover');
  });

  dropzone.addEventListener('drop', e => {
    e.preventDefault();
    dropzone.classList.remove('dragover');
    loadFiles(e.dataTransfer.files);
  });

  updateCounter();
}

// =====================================================
// KEYBOARD NAV
// =====================================================

window.addEventListener('keydown', e => {

  if (e.key === 'ArrowRight')
    showPage(state.currentIndex + 1);

  if (e.key === 'ArrowLeft')
    showPage(state.currentIndex - 1);

  // ESC → grid page
  if (e.key === 'Escape' && state.gridPage) {

    const gridIndex =
      state.pages.indexOf(state.gridPage);

    showPage(gridIndex);
  }
});

// =====================================================
// INIT
// =====================================================

createIntroPage();
</script>

</body>
</html>
