<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<script src="https://cdn.tailwindcss.com"></script>

<title>Page Turn Effect</title>

<style>
  body {
    overflow: hidden;
    background: #111;
  }

  .scene {
    perspective: 3000px;
  }

  .book {
    position: relative;
    width: 1920px;
    height: 1080px;
    transform-style: preserve-3d;
  }

  .page {
    position: absolute;
    inset: 0;
    transform-origin: left center;
    transform-style: preserve-3d;
    backface-visibility: hidden;
  }

  .page-front,
  .page-back {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    overflow: hidden;
  }

  .page-front {
    background: linear-gradient(135deg, #ffffff, #dcdcdc);
  }

  .page-back {
    background: linear-gradient(135deg, #ececec, #cfcfcf);
    transform: rotateY(180deg);
  }

  .page-shadow {
    position: absolute;
    inset: 0;
    pointer-events: none;
    background:
      linear-gradient(
        to right,
        rgba(0,0,0,0.35),
        rgba(0,0,0,0) 18%
      );
    opacity: 0;
  }

  .turning {
    animation: turnPage 2.5s ease-in-out forwards;
  }

  .turning .page-shadow {
    animation: shadowMove 2.5s ease-in-out forwards;
  }

  @keyframes turnPage {
    0% {
      transform: rotateY(0deg);
      z-index: 100;
    }

    50% {
      transform: rotateY(-90deg);
    }

    100% {
      transform: rotateY(-180deg);
      z-index: 100;
    }
  }

  @keyframes shadowMove {
    0% {
      opacity: 0;
    }

    25% {
      opacity: 1;
    }

    100% {
      opacity: 0;
    }
  }

  canvas {
    width: 100%;
    height: 100%;
    display: block;
  }
</style>
</head>

<body class="w-screen h-screen flex items-center justify-center">

<div class="scene">

  <div id="book" class="book shadow-2xl">

    <!-- PAGE 1 -->
    <div class="page z-30">
      <div class="page-front">
        <canvas id="canvas1" width="1920" height="1080"></canvas>
      </div>
    </div>

    <!-- PAGE 2 -->
    <div id="turnPage" class="page z-40">
      <div class="page-front">
        <canvas id="canvas2" width="1920" height="1080"></canvas>
      </div>

      <div class="page-back">
        <canvas id="canvas3" width="1920" height="1080"></canvas>
      </div>

      <div class="page-shadow"></div>
    </div>

    <!-- PAGE 3 -->
    <div class="page z-10">
      <div class="page-front">
        <canvas id="canvas4" width="1920" height="1080"></canvas>
      </div>
    </div>

  </div>

</div>

<script>
  // =====================================================
  // CANVAS DRAWING
  // =====================================================

  function drawPage(canvasId, bg, text) {
    const canvas = document.getElementById(canvasId);
    const ctx = canvas.getContext('2d');

    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // background pattern
    for (let i = 0; i < 120; i++) {
      ctx.fillStyle = `rgba(255,255,255,${Math.random() * 0.06})`;

      ctx.beginPath();
      ctx.arc(
        Math.random() * canvas.width,
        Math.random() * canvas.height,
        Math.random() * 120,
        0,
        Math.PI * 2
      );

      ctx.fill();
    }

    ctx.fillStyle = '#fff';
    ctx.font = 'bold 120px sans-serif';
    ctx.textAlign = 'center';

    ctx.fillText(
      text,
      canvas.width / 2,
      canvas.height / 2
    );
  }

  drawPage('canvas1', '#1e3a8a', 'PAGE 1');
  drawPage('canvas2', '#7c3aed', 'PAGE 2');
  drawPage('canvas3', '#059669', 'BACK');
  drawPage('canvas4', '#dc2626', 'PAGE 3');

  // =====================================================
  // PAGE TURN LOOP
  // =====================================================

  const turnPage = document.getElementById('turnPage');

  function animateTurn() {
    turnPage.classList.remove('turning');

    // force reflow
    void turnPage.offsetWidth;

    turnPage.classList.add('turning');
  }

  // initial delay
  setTimeout(animateTurn, 500);

  // every 10 seconds
  setInterval(() => {
    animateTurn();
  }, 5000);
</script>

</body>
</html>
