<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
/>
<link rel='icon' href='data:;base64,='>
<title>PRESET LOOP - Typographic design dzine</title>

<script src='tailwindcss.min.js'></script>

<link rel='stylesheet' href='style.css' />
</head>

<body class="bg-[#111] text-white">

<!-- ====================================================== -->
<!-- APP -->
<!-- ====================================================== -->

<div class="w-screen h-screen flex flex-col">

  <!-- ==================================================== -->
  <!-- TOP BAR -->
  <!-- ==================================================== -->

  <header
  class="relative max-w-[2068px] h-11 mb-0.5 flex items-center justify-between p-4 shrink-0 z-50"
>

  <!-- LEFT -->
  <div class="flex gap-4 z-10">

    <div
      id="issueLabel"
      class="text-[10px] md:text-sm mt-1 text-zinc-400"
    >
      Select Issue
    </div>

  </div>

  <!-- CENTER -->
  <div
    class="md:absolute left-1/2 -translate-x-1/2 flex flex-col items-center pointer-events-none"
  >

    <h1 class="text-lg font-semibold md:tracking-[20px]">
      PRESET LOOP
    </h1>

    <p class="text-[10px] md:text-sm p-0 -mt-1.5 md:tracking-[10px]">
      Typographic design dzine
    </p>

  </div>

  <!-- RIGHT -->
  <div class="hidden md:flex gap-2 -mr-3 z-10">

    <button
      id="prevBtn"
      class="w-10 h-10 rounded bg-zinc-800 hover:bg-zinc-700 transition"
    >
      ←
    </button>

    <button
      id="nextBtn"
      class="w-10 h-10 rounded bg-zinc-800 hover:bg-zinc-700 transition"
    >
      →
    </button>

  </div>

</header>
  <!-- ==================================================== -->
  <!-- MAIN -->
  <!-- ==================================================== -->

  <div class="flex flex-1 overflow-hidden">

    <!-- ================================================== -->
    <!-- SIDEBAR -->
    <!-- ================================================== -->

    <aside
      class="w-[105px] md:w-36 px-2 overflow-y-auto shrink-0"
    >

      <div
        id="issueList"
        class="space-y-2"
      ></div>

    </aside>

    <!-- ================================================== -->
    <!-- VIEWER -->
    <!-- ================================================== -->

    <main class="relative flex-1 overflow-hidden">

      <!-- CANVAS STACK -->
<div class="absolute inset-0">

  <div class="w-full max-w-[1920px] aspect-[16/9] relative">

    <canvas
      id="canvasA"
      class="fade-layer active w-full h-full"
      width="1920"
      height="1080"
    ></canvas>

    <canvas
      id="canvasB"
      class="fade-layer w-full h-full"
      width="1920"
      height="1080"
    ></canvas>

  </div>

</div>
      <!-- THUMBNAILS -->
      <div
        id="thumbnailOverlay"
        class="absolute inset-0 bg-black/95 hidden overflow-y-auto thumb-scroll"
      >

        <div
          id="thumbnailGrid"
          class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 xl:grid-cols-8 gap-4 p-6"
        ></div>

      </div>

      <!-- LOADING -->
      <div
        id="loading"
        class="absolute bottom-6 left-1/2 -translate-x-1/2 bg-zinc-900 px-4 py-2 rounded text-sm hidden"
      >
        Loading images...
      </div>

    </main>

  </div>

</div>

<script src="script.js">

</script>

</body>
</html>
