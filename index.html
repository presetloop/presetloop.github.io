<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
/>
<link rel='icon' href='data:;base64,='>
<title>PRESET LOOP - TypoGraphic Design</title>

<script src='tailwindcss.min.js'></script>

<link rel='stylesheet' href='style.css' />
</head>

<body class="bg-[#111] text-white">

<!-- ====================================================== -->
<!-- APP -->
<!-- ====================================================== -->

<div class="w-screen h-screen flex flex-col">

<header class="relative max-w-[1980px]">
    
    
<!-- MASTHEAD -->
<div id="masthead" class="md:mr-1 h-24 bg-[#fff] flex items-center p-4 shrink-0">
  
  <!-- hidden link - masking smoking rabbit image -->
  <!-- hidden link -->
  <a
    href="https://presetloop.olk1.com/gif.html"
    target="_blank"
    rel="noopener noreferrer"
    class="absolute top-[95px] left-0 z-50 text-transparent px-6 py-2.5 cursor-crosshair"
  >
    .
  </a>
  <!-- \hidden link -->
  <!-- \hidden link -->


  <div
    class="w-full flex flex-col md:flex-row items-center pointer-events-none text-black"
  >

    <h1 class="font-mono font-bold text-4xl leading-[30px] sm:-ml-3.5 flex items-center">
      <span class="inline-block">PRESET</span> 
      <span class="inline-block ml-0.5">
        L<span><img src="pl-logo-trans.png" alt="Preset Loop" class="h-[30px] w-auto"></span>P
      </span>
    </h1>

    <p class="text-[10px] md:text-sm p-0 mt-0.5 tracking-[10px] sm:tracking-[15px] bg-white italic">
      <span class="bg-white inline-block text-black -rotate-3 -ml-0.5 xs:ml-3 md:ml-3 relative z-50">
        TypoGraphic Design
      </span>
    </p>

    <div class="hidden md:block ml-auto text-sm w-16 text-zinc-400 text-center">you can use keyboard arrows</div>

<!--  -->
</div>

</div>
<!-- \MASTHEAD -->




<!-- nav info / ticker / arrows -->
<div id="ticker-bar" class="hidden border-t border-[#ffd5d1] lg:mr-1 h-11 md:flex items-center justify-between p-0 shrink-0 z-50">
  
  
  <!-- LEFT -->
  <div class="flex gap-0 z-10">
  
  <div class="rabbit"></div>   
  
    <div
      id="issueLabel"
      class="w-36 hidden md:flex flex-col leading-[16px] tracking-tight sm:ml-[6px] sm:text-sm mt-2 text-gray-300"
    >
      Select Issue
    </div>

  </div>



<!--  -->
<!--  -->
<!-- CENTER -->
<!-- ======================================================
TICKER
====================================================== -->

<div id="ticker" class="relative overflow-hidden h-36 w-full ml-6 sm:-ml-12"></div>

<!--  -->
<!--  -->




  <!-- RIGHT -->
  <div class="hidden md:flex gap-1 z-10">

    <button
      id="prevBtn"
      class="w-10 h-10 rounded bg-zinc-800 hover:bg-zinc-700 transition"
    >
      ←
    </button>

    <button
      id="nextBtn"
      class="w-10 h-10 rounded bg-zinc-800 hover:bg-zinc-700 transition"
    >
      →
    </button>

  </div>
  
  
<!-- /ticker-bar -->
</div>

<!--  -->
</header>
  <!-- ==================================================== -->
  <!-- MAIN -->
  <!-- ==================================================== -->

  <div class="flex flex-1 overflow-hidden">

    <!-- ================================================== -->
    <!-- SIDEBAR -->
    <!-- ================================================== -->

    <aside
      class="hidden md:block w-[55px] px-1 overflow-y-auto shrink-0"
    >

      <div
        id="issueList"
        class="space-y-2"
      ></div>

    </aside>

    <!-- ================================================== -->
    <!-- VIEWER -->
    <!-- ================================================== -->

    <main class="relative flex-1 overflow-hidden">

      <!-- CANVAS STACK -->
<div class="absolute inset-0">

<div
  id="pagesContainer"
  class="-ml-1 2xl:ml-0 w-full max-w-[1920px] aspect-[16/9] relative"
>
  <canvas
    id="canvas"
    class="w-full h-auto"
    width="1920"
    height="1080"
  ></canvas>
</div>

</div>
      <!-- THUMBNAILS -->
      <div
        id="thumbnailOverlay"
        class="absolute inset-0 bg-black/95 hidden overflow-y-auto thumb-scroll"
      >

        <div
          id="thumbnailGrid"
          class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 max-w-[1942px] gap-4 p-6 mb-24"
        ></div>

      </div>

      <!-- LOADING -->
      <div
        id="loading"
        class="absolute -mt-32 top-1/2 left-1/2 -translate-x-1/2 bg-zinc-900 px-4 py-0 rounded text-7xl hidden"
      >
        Loading...
      </div>

    </main>

  </div>

</div>


<script>

</script>


<script type="module" src="script.js"></script>
</body>
</html>
