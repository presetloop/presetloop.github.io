<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Magazine Viewer</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
  html, body {
    margin: 0;
    overflow: hidden;
    background: #050505;
    font-family: sans-serif;
  }

  .viewer-shell {
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .magazine-wrapper {
    position: relative;
  }

  .magazine {
    position: relative;
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background: #000;
    box-shadow: 0 0 80px rgba(0,0,0,0.75);
    transform-origin: center center;
  }

  /* =====================================================
     PAGES
  ===================================================== */

  .page {
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.8s ease;
    pointer-events: none;
  }

  .page.active {
    opacity: 1;
    pointer-events: auto;
  }

  canvas {
    width: 100%;
    height: 100%;
    display: block;
    background: #000;
  }

  /* =====================================================
     ADMIN UI
  ===================================================== */

  .admin-panel {
    position: absolute;
    top: -70px;
    left: 0;
    display: flex;
    gap: 12px;
    z-index: 100;
  }

  .btn {
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 12px;
    letter-spacing: 0.1em;
    cursor: pointer;
    color: white;
    background: rgba(255,255,255,0.08);
  }

  .btn:hover {
    background: rgba(255,255,255,0.18);
  }

  .danger {
    background: rgba(255,0,0,0.2);
  }

  /* =====================================================
     INTRO UI
  ===================================================== */

  .page-ui {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 48px;
    z-index: 50;
  }

  .dropzone {
    width: 520px;
    border: 2px dashed rgba(255,255,255,0.2);
    background: rgba(0,0,0,0.45);
    border-radius: 28px;
    padding: 32px;
  }

  .hidden-ui {
    display: none !important;
  }

  /* =====================================================
     GRID
  ===================================================== */

  .grid-page {
    width: 100%;
    height: 100%;
    overflow-y: auto;
    padding: 40px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 24px;
    background: #050505;
  }

  .thumb {
    position: relative;
    border-radius: 18px;
    overflow: hidden;
    aspect-ratio: 16/9;
    cursor: pointer;
  }

  .thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .delete-x {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 30px;
    height: 30px;
    border-radius: 999px;
    background: rgba(0,0,0,0.7);
    color: white;
    display: none;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }

  .thumb:hover .delete-x {
    display: flex;
  }

  /* =====================================================
     SCALE
  ===================================================== */

  @media (max-width: 1920px), (max-height: 1080px) {
    .magazine-wrapper {
      transform: scale(min(100vw / 1920, 100vh / 1080));
    }
  }
</style>
</head>

<body>

<div class="viewer-shell">

  <div class="magazine-wrapper">

    <div id="magazine" class="magazine">

      <div id="pages"></div>

    </div>

  </div>

</div>

<script>
/* =======================================================
   STATE
======================================================= */

const state = {
  pages: [],
  imagePages: [],
  images: [],
  gridPage: null,
  introPage: null,
  currentIndex: 0,
  isAdmin: false
};

/* =======================================================
   AUTH
======================================================= */

function askAdmin() {
  const pw = prompt("Enter admin password:");
  if (pw === "admin") {
    state.isAdmin = true;
  }
}

/* =======================================================
   NAV
======================================================= */

function showPage(i) {
  if (!state.pages.length) return;

  if (i < 0) i = 0;
  if (i >= state.pages.length) i = state.pages.length - 1;

  state.pages.forEach(p => p.classList.remove("active"));
  state.pages[i].classList.add("active");

  state.currentIndex = i;
}

/* =======================================================
   IMAGE PAGE
======================================================= */

function createImagePage(src) {
  const page = document.createElement("div");
  page.className = "page";

  const canvas = document.createElement("canvas");
  canvas.width = 1920;
  canvas.height = 1080;

  const ctx = canvas.getContext("2d");

  const img = new Image();

  img.onload = () => {
    ctx.fillStyle = "#000";
    ctx.fillRect(0, 0, 1920, 1080);

    const s = Math.min(1920 / img.width, 1080 / img.height);

    const w = img.width * s;
    const h = img.height * s;

    const x = (1920 - w) / 2;
    const y = (1080 - h) / 2;

    ctx.drawImage(img, x, y, w, h);
  };

  img.src = src;

  page.appendChild(canvas);

  page.addEventListener("click", () => {
    const gridIndex = state.pages.indexOf(state.gridPage);
    showPage(gridIndex);
  });

  state.pages.splice(state.pages.length - 1, 0, page);
  state.imagePages.push(page);

  document.getElementById("pages").insertBefore(page, state.gridPage);
}

/* =======================================================
   DELETE SINGLE (ADMIN ONLY)
======================================================= */

function deleteImage(index) {
  if (!state.isAdmin) return;

  const ok = prompt('Type "okay" to delete this page');
  if (ok !== "okay") return;

  const confirmed = confirm("Delete this page?");
  if (!confirmed) return;

  const page = state.imagePages[index];
  if (!page) return;

  page.remove();

  state.imagePages.splice(index, 1);
  state.images.splice(index, 1);

  rebuildGrid();
}

/* =======================================================
   GRID
======================================================= */

function rebuildGrid() {
  if (state.gridPage) state.gridPage.remove();

  const page = document.createElement("div");
  page.className = "page";

  const grid = document.createElement("div");
  grid.className = "grid-page";

  state.images.forEach((src, i) => {
    const thumb = document.createElement("div");
    thumb.className = "thumb";

    thumb.innerHTML = `
      <img src="${src}">
      <div class="delete-x">×</div>
    `;

    thumb.onclick = () => {
      showPage(i + 1);
    };

    if (state.isAdmin) {
      thumb.querySelector(".delete-x").onclick = (e) => {
        e.stopPropagation();
        deleteImage(i);
      };
    }

    grid.appendChild(thumb);
  });

  page.appendChild(grid);

  document.getElementById("pages").appendChild(page);

  state.pages.push(page);
  state.gridPage = page;
}

/* =======================================================
   INTRO PAGE
======================================================= */

function createIntro() {
  const page = document.createElement("div");
  page.className = "page active";

  const canvas = document.createElement("canvas");
  canvas.width = 1920;
  canvas.height = 1080;

  const ctx = canvas.getContext("2d");

  ctx.fillStyle = "#111";
  ctx.fillRect(0,0,1920,1080);

  ctx.fillStyle = "#fff";
  ctx.font = "bold 90px sans-serif";
  ctx.textAlign = "center";
  ctx.fillText("MAGAZINE", 960, 400);

  page.appendChild(canvas);

  const ui = document.createElement("div");
  ui.className = "page-ui";

  if (state.isAdmin) {
    ui.innerHTML = `
      <div class="admin-panel">
        <button id="uploadBtn" class="btn">UPLOAD</button>
        <button id="clearBtn" class="btn danger">CLEAR</button>
        <input id="fileInput" type="file" multiple accept="image/*" class="hidden">
      </div>

      <div class="dropzone">
        <h2 style="color:white;font-size:28px;">Admin Upload</h2>
        <p style="color:#aaa;">Drag images here</p>
      </div>

      <div style="color:#888;text-align:center;">
        Arrow keys / swipe navigation
      </div>
    `;
  } else {
    ui.innerHTML = `
      <div style="color:white;text-align:center;">
        Viewer Mode
      </div>
    `;
  }

  page.appendChild(ui);

  document.getElementById("pages").appendChild(page);

  state.pages.push(page);
  state.introPage = page;

  if (state.isAdmin) {
    const fileInput = ui.querySelector("#fileInput");
    const uploadBtn = ui.querySelector("#uploadBtn");
    const clearBtn = ui.querySelector("#clearBtn");

    uploadBtn.onclick = () => fileInput.click();

    fileInput.onchange = e => loadFiles(e.target.files);

    clearBtn.onclick = () => {
      const ok = confirm("Delete all pages?");
      if (!ok) return;

      state.imagePages.forEach(p => p.remove());
      state.images = [];
      state.imagePages = [];

      rebuildGrid();
      showPage(0);
    };
  }
}

/* =======================================================
   LOAD FILES
======================================================= */

function loadFiles(files) {
  [...files].forEach(f => {
    if (!f.type.startsWith("image/")) return;

    const r = new FileReader();

    r.onload = e => {
      state.images.push(e.target.result);
      createImagePage(e.target.result);
      rebuildGrid();

      if (state.images.length === 1) {
        showPage(1);
      }
    };

    r.readAsDataURL(f);
  });
}

/* =======================================================
   INPUT
======================================================= */

window.addEventListener("keydown", e => {
  if (e.key === "ArrowRight") showPage(state.currentIndex + 1);
  if (e.key === "ArrowLeft") showPage(state.currentIndex - 1);
});

/* =======================================================
   INIT
======================================================= */

askAdmin();
createIntro();
</script>

</body>
</html>
