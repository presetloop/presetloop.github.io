<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
/>
<link rel='icon' href='data:;base64,='>
<title>Magazine Issues Viewer</title>

<script src='tailwindcss.min.js'></script>

<link rel='stylesheet' href='style.css' />
</head>

<body class="bg-[#111] text-white">

<!-- ====================================================== -->
<!-- APP -->
<!-- ====================================================== -->

<div class="w-screen h-screen flex flex-col">

  <!-- ==================================================== -->
  <!-- TOP BAR -->
  <!-- ==================================================== -->

  <header
    class="max-w-[2192px] h-11 mb-0.5 flex items-center justify-between p-4 shrink-0 z-50"
  >

    <div class="flex justify-between items-end gap-4">


      <div class="-ml-1">
        <h1 class="text-lg font-semibold tracking-[10px]">
        PRESET LOOP

      </h1>
      
      <p class="p-0 -mt-2.5 tracking-[2px]">Typographic design dzine</p>

      </div>

      <div
        id="issueLabel"
        class="text-sm mb-[1px] -ml-1 text-zinc-400"
      >
        Select Issue
      </div>

    </div>

    <div class="flex gap-2">

      <button
        id="prevBtn"
        class="w-10 h-10 rounded bg-zinc-800 hover:bg-zinc-700 transition"
      >
        ←
      </button>

      <button
        id="nextBtn"
        class="w-10 h-10 rounded bg-zinc-800 hover:bg-zinc-700 transition"
      >
        →
      </button>

    </div>

  </header>

  <!-- ==================================================== -->
  <!-- MAIN -->
  <!-- ==================================================== -->

  <div class="flex flex-1 overflow-hidden">

    <!-- ================================================== -->
    <!-- SIDEBAR -->
    <!-- ================================================== -->

    <aside
      class="w-64 px-2 overflow-y-auto shrink-0"
    >

      <div
        id="issueList"
        class="space-y-2"
      ></div>

    </aside>

    <!-- ================================================== -->
    <!-- VIEWER -->
    <!-- ================================================== -->

    <main class="relative flex-1 overflow-hidden">

      <!-- CANVAS STACK -->
      <div class="absolute inset-0">

        <canvas
          id="canvasA"
          class="fade-layer active"
          width="1920"
          height="1080"
        ></canvas>

        <canvas
          id="canvasB"
          class="fade-layer"
          width="1920"
          height="1080"
        ></canvas>

      </div>

      <!-- THUMBNAILS -->
      <div
        id="thumbnailOverlay"
        class="absolute inset-0 bg-black/95 hidden overflow-y-auto thumb-scroll"
      >

        <div
          id="thumbnailGrid"
          class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 xl:grid-cols-8 gap-4 p-6"
        ></div>

      </div>

      <!-- LOADING -->
      <div
        id="loading"
        class="absolute bottom-6 left-1/2 -translate-x-1/2 bg-zinc-900 px-4 py-2 rounded text-sm hidden"
      >
        Loading images...
      </div>

    </main>

  </div>

</div>

<script src="script.js">

</script>

</body>
</html>
