<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
/>
<link rel='icon' href='data:;base64,='>
<title>PRESET LOOP</title>

<script src='tailwindcss.min.js'></script>

<link rel='stylesheet' href='style.css' />
</head>

<body class="bg-white text-white">
<div class="w-screen h-screen flex flex-col">



<header class="relative">

  <!-- ISSUE LIST -->
  <aside
    id="issueList"
    class="absolute top-0 left-0 flex flex-col overflow-y-auto z-50"
  ></aside>

  <!-- MASTHEAD -->
  <div
    id="masthead"
    class="h-24 bg-white grid grid-cols-3 items-center px-2 select-none"
  >

    <!-- LEFT (empty spacer) -->
    <div></div>

    <!-- CENTER (strictly centered) -->
    <div class="flex justify-center -ml-12 sm:ml-0">
      <div class="key-instructions inline-flex flex-col items-center text-sm sm:text-lg">
        <div class="key-row">
          <span class="key">←</span>
          <span class="key">→</span>
          <span class="label">Navigate</span>
        </div>

        <div class="key-row">
          <span class="key">Esc</span>
          <span class="label mr-8">EXIT</span>
        </div>
      </div>
    </div>

    <!-- RIGHT (logo pinned) -->
    <div class="flex justify-end">
      <a href="about.html">
        <img
          src="pl-logo-trans.png"
          alt="Preset Loop"
          class="h-[55px] w-auto mr-2 -mt-3 hover:opacity-20" title="click me"/>
      </a>
    </div>

  </div>

</header>

  <div class="flex flex-1 overflow-hidden">


    <main class="relative flex-1 overflow-hidden">


<div class="flex flex-col">

<div
  id="pagesContainer"
  class="-ml-1 2xl:ml-0 w-full max-w-[1920px] aspect-[16/9] relative opacity-0 transition-opacity"
>
  
<canvas
  id="canvas"
  class="w-full h-auto"
  width="1920"
  height="1080"
></canvas>

</div>

</div>



      <div
        id="thumbnailOverlay"
        class="md:mt-0 absolute inset-0 overflow-y-auto thumb-scroll"
      >

        <div
          id="thumbnailGrid"
          class="ml-8 grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 max-w-[1942px] gap-4 p-6 mb-24"
        ></div>

      </div>


      <div
        id="loading"
        class="absolute -mt-32 md:-ml-40 top-1/2 left-1/2 -translate-x-1/2 text-black px-4 py-0 rounded text-7xl hidden"
      >
        Loading...
      </div>

    </main>

  </div>

</div>

<script>
const canvas = document.getElementById('canvas');
const thumbnailOverlay = document.getElementById('thumbnailOverlay');

let hiddenElements = [];
let canvasOnlyMode = false;

function enableCanvasOnlyMode() {
  if (canvasOnlyMode) return;

  hiddenElements = [];

  document.querySelectorAll('body *').forEach(el => {
    const keepVisible =
      el === canvas ||
      el.contains(canvas);

    if (!keepVisible) {
      hiddenElements.push(el);
      el.style.display = 'none';
    }
  });

  canvas.style.position = 'fixed';
  canvas.style.top = '0';
  canvas.style.left = '0';
  canvas.style.width = '100vw';
  canvas.style.height = '100vh';
  canvas.style.zIndex = '999999';

  canvasOnlyMode = true;
}

function disableCanvasOnlyMode() {
  if (!canvasOnlyMode) return;

  hiddenElements.forEach(el => {
    el.style.display = '';
  });

  canvas.style.position = '';
  canvas.style.top = '';
  canvas.style.left = '';
  canvas.style.width = '';
  canvas.style.height = '';
  canvas.style.zIndex = '';

  hiddenElements = [];
  canvasOnlyMode = false;
}

function enterCanvasOnlyMode() {
  enableCanvasOnlyMode();
}

document.addEventListener('keydown', e => {
  const tag = document.activeElement.tagName;
  const ignoreTyping = tag === 'INPUT' || tag === 'TEXTAREA';

  // Escape exits only
  if (e.key === 'Escape') {
    disableCanvasOnlyMode();
    return;
  }

  // Arrow keys only ENTER mode (never exit)
  if ((e.key === 'ArrowLeft' || e.key === 'ArrowRight') && !ignoreTyping) {
    e.preventDefault();
    enableCanvasOnlyMode();
  }
});
</script>
<!--  -->
<script type="module" src="script.js"></script>
</body>
</html>
