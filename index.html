<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
/>
<link rel='icon' href='data:;base64,='>
<title>PRESET LOOP - TypoGraphic Design</title>

<script src='tailwindcss.min.js'></script>

<link rel='stylesheet' href='style.css' />
</head>

<body class="bg-[#111] text-white">

<!-- ====================================================== -->
<!-- APP -->
<!-- ====================================================== -->

<div class="w-screen h-screen flex flex-col">

<header class="relative max-w-[1980px]">
    
    
<!-- MASTHEAD -->
<div id="masthead" class="md:mr-1 h-24 bg-[#ffd5d1] flex items-center p-4 shrink-0 z-50">
  
  <!-- hidden link - masking smoking rabbit image -->
  <!-- hidden link -->
  <a
    href="https://presetloop.olk1.com/gif.html"
    target="_blank"
    rel="noopener noreferrer"
    class="absolute top-4 right-4 z-10 bg-transparent text-transparent px-7 py-6"
  >
    .
  </a>
  <!-- \hidden link -->
  <!-- \hidden link -->


  <div
    class="flex flex-col sm:flex-row items-center pointer-events-none text-black"
  >

    <h1 class="text-3xl flex">
      PRESET L<span><img src="pl-logo-trans.png" alt="Preset Loop" class="h-8 w-auto"></span>P
    </h1>

    <p class="text-[10px] md:text-sm p-0 -mt-1.5 tracking-[5px] sm:tracking-[10px] bg-white italic">
      <span class="text-black">
        TypoGraphic Design
      </span>
    </p>

  </div>
<!--  -->
</div>
<!-- \MASTHEAD -->




<!-- nav info / ticker / arrows -->
<div class="h-11 mb-0.5 flex items-center justify-between p-0 shrink-0 z-50">
  
  
  <!-- LEFT -->
  <div class="flex gap-4 z-10">

    <div
      id="issueLabel"
      class="text-[10px] -ml-3 sm:ml-0 sm:text-sm mt-1 text-gray-300"
    >
      Select Issue
    </div>

  </div>



<!--  -->
<!--  -->
<!-- CENTER -->
<!-- ======================================================
TICKER
====================================================== -->

<div id="ticker" class="relative overflow-hidden h-36 w-full"></div>

<!--  -->
<!--  -->




  <!-- RIGHT -->
  <div class="hidden sm:flex gap-1 lg:mr-1 z-10">

    <button
      id="prevBtn"
      class="w-10 h-10 rounded bg-zinc-800 hover:bg-zinc-700 transition"
    >
      ←
    </button>

    <button
      id="nextBtn"
      class="w-10 h-10 rounded bg-zinc-800 hover:bg-zinc-700 transition"
    >
      →
    </button>

  </div>
  <!--  -->
</div>
</header>
  <!-- ==================================================== -->
  <!-- MAIN -->
  <!-- ==================================================== -->

  <div class="flex flex-1 overflow-hidden">

    <!-- ================================================== -->
    <!-- SIDEBAR -->
    <!-- ================================================== -->

    <aside
      class="w-[55px] px-2 overflow-y-auto shrink-0"
    >

      <div
        id="issueList"
        class="space-y-2"
      ></div>

    </aside>

    <!-- ================================================== -->
    <!-- VIEWER -->
    <!-- ================================================== -->

    <main class="relative flex-1 overflow-hidden">

      <!-- CANVAS STACK -->
<div class="absolute inset-0">

  <div class="w-full max-w-[1920px] aspect-[16/9] relative">

    <canvas
      id="canvas"
      class="w-full h-full"
      width="1920"
      height="1080"
    ></canvas>


  </div>

</div>
      <!-- THUMBNAILS -->
      <div
        id="thumbnailOverlay"
        class="absolute inset-0 bg-black/95 hidden overflow-y-auto thumb-scroll"
      >

        <div
          id="thumbnailGrid"
          class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 max-w-[1942px] gap-4 p-6"
        ></div>

      </div>

      <!-- LOADING -->
      <div
        id="loading"
        class="absolute bottom-6 left-1/2 -translate-x-1/2 bg-zinc-900 px-4 py-2 rounded text-sm hidden"
      >
        Loading images...
      </div>

    </main>

  </div>

</div>

<script type="module" src="script.js"></script>

</body>
</html>
